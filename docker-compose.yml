services:
  control-plane:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./aicipc.db:/app/aicipc.db
    environment:
      - API_KEY=aicipc-secret-2026

  rack-manager:
    build: .
    command: ["python", "-m", "src.rack_manager.agent"]
    environment:
      - API_KEY=aicipc-secret-2026
      - HEARTBEAT_INTERVAL_SECONDS=2
      - DUT_COUNT=10
    depends_on:
      - control-plane
